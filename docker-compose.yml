version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: agency_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       agency_db
      POSTGRES_USER:     agency
      POSTGRES_PASSWORD: agency_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/001_initial.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agency -d agency_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API (Node.js / Fastify) ────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: agency_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agency:agency_pass@postgres:5432/agency_db
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

  # ── Web (Next.js) ──────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agency_web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
