version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: agency_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DATABASE_NAME}
      POSTGRES_USER:     ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/yourorg/agency-api:latest
    container_name: agency_api
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  web:
    image: ghcr.io/yourorg/agency-web:latest
    container_name: agency_web
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      - api
    expose:
      - "3000"

  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agency_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
